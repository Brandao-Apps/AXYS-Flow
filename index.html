<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXYS Flow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#121212', 800: '#1E1E1E', 700: '#2D2D2D' },
                        accent: { 500: '#00FFA3', 600: '#00CC82' }
                    }
                }
            }
        }
    </script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark-900 text-white min-h-screen font-sans antialiased selection:bg-accent-500 selection:text-dark-900">
    <div class="max-w-md mx-auto p-4 sm:p-6 lg:p-8 min-h-screen flex flex-col">
        
        <!-- Header / User Stats -->
        <header class="flex justify-between items-center mb-8 bg-dark-800 p-4 rounded-xl shadow-lg border border-dark-700">
            <div>
                <h1 class="text-xl font-bold tracking-tight">AXYS <span class="text-accent-500">Flow</span></h1>
                <p class="text-sm text-gray-400" id="currentDate">Carregando data...</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total XP</p>
                <div class="flex items-center gap-2">
                    <span id="userXpDisplay" class="text-2xl font-black text-accent-500">0</span>
                    <span class="text-xs text-accent-500">XP</span>
                </div>
            </div>
        </header>

        <!-- Tasks Section -->
        <main class="flex-grow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold border-b-2 border-accent-500 pb-1 inline-block">Tarefas de Hoje</h2>
                <button onclick="document.getElementById('modalNovaTarefa').classList.remove('hidden')" class="bg-accent-500 hover:bg-accent-600 text-dark-900 px-3 py-1 rounded-md text-sm font-bold transition-colors">
                    + Nova
                </button>
            </div>

            <ul id="taskList" class="space-y-3">
                <li class="text-center text-gray-500 py-8 text-sm italic" id="emptyState">Carregando suas tarefas...</li>
            </ul>
        </main>
        
        <!-- XP Animation Overlay -->
        <div id="xpAnimation" class="fixed inset-0 pointer-events-none flex items-center justify-center opacity-0 transition-opacity duration-300 z-50">
            <div class="bg-dark-800/90 border-2 border-accent-500 px-8 py-6 rounded-2xl shadow-[0_0_30px_rgba(0,255,163,0.3)] transform scale-90 transition-transform duration-300" id="xpPopup">
                <p class="text-accent-500 text-3xl font-black text-center flex flex-col items-center gap-2">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span id="xpGainedText">+0 XP</span>
                </p>
                <p class="text-gray-300 text-sm mt-2 text-center">Missão Cumprida!</p>
            </div>
        </div>

        <!-- Modal Nova Tarefa -->
        <div id="modalNovaTarefa" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-40 flex items-center justify-center p-4">
            <div class="bg-dark-800 rounded-xl p-6 w-full max-w-sm border border-dark-700">
                <h3 class="text-lg font-bold mb-4 text-white">Nova Tarefa</h3>
                <input type="text" id="novaTarefaTitle" placeholder="O que precisa ser feito?" class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2 mb-3 text-white focus:outline-none focus:border-accent-500">
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">XP</label>
                        <input type="number" id="novaTarefaXp" value="50" class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Recorrência</label>
                        <select id="novaTarefaRecorrencia" class="w-full bg-dark-900 border border-dark-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-accent-500 text-sm">
                            <option value="none">Única</option>
                            <option value="diaria">Diária</option>
                            <option value="semanal">Semanal</option>
                            <option value="mensal">Mensal</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex gap-2 mt-6">
                    <button onclick="document.getElementById('modalNovaTarefa').classList.add('hidden')" class="flex-1 bg-dark-700 hover:bg-dark-600 py-2 rounded-lg text-sm font-semibold transition-colors">Cancelar</button>
                    <button onclick="criarTarefaDeTeste()" class="flex-1 bg-accent-500 hover:bg-accent-600 text-dark-900 py-2 rounded-lg text-sm font-bold transition-colors">Criar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="src/js/config.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
